[package]
name = "hardy-mtcp-cla"
description = "MTCP/STCP CLA binary for interop testing (not a standards-track protocol)"
version = "0.1.0"
edition = "2024"
rust-version = "1.87"
publish = false

[[bin]]
name = "mtcp-cla"
path = "src/main.rs"

[lints.rust]
unexpected_cfgs = { level = "allow", check-cfg = ['cfg(feature, values("instrument"))'] }

[dependencies]
hardy-proto = { path = "../../../proto" }
hardy-bpa = { path = "../../../bpa" }
hardy-bpv7 = { path = "../../../bpv7" }
hardy-cbor = { path = "../../../cbor" }
hardy-async = { path = "../../../async" }
tokio = { version = "1", features = ["macros", "time", "net", "io-util", "rt-multi-thread", "signal"] }
tokio-util = { version = "0.7", features = ["codec"] }
futures = "0.3"
clap = { version = "4", features = ["derive"] }
tracing = { version = "0.1", default-features = false }
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
anyhow = "1"
serde = { version = "1", features = ["derive"] }
config = { version = "0.15", features = ["yaml", "toml", "json"] }
