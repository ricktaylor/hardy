# Infrastructure for storage integration tests.
#
# Start before running postgres/s3 tests:
#
#   docker compose -f tests/compose.storage-tests.yml up -d
#   TEST_POSTGRES_URL=postgresql://hardy:hardy@localhost:5432 \
#   TEST_S3_ENDPOINT=http://localhost:9000 \
#   AWS_ACCESS_KEY_ID=minioadmin \
#   AWS_SECRET_ACCESS_KEY=minioadmin \
#     cargo test -p storage-tests --features postgres,s3
#
# Postgres tests create and drop a unique database per test — no manual setup needed.
# S3 tests use a unique key prefix per test — no manual cleanup needed.

services:

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: hardy
      POSTGRES_PASSWORD: hardy
      POSTGRES_DB: hardy
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hardy"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/hardy-test
      "
    restart: "no"
