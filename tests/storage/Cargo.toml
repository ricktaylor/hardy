[package]
name = "storage-tests"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[dependencies]
hardy-bpa = { path = "../../bpa" }
hardy-bpv7 = { path = "../../bpv7", features = ["std"] }
hardy-sqlite-storage = { path = "../../sqlite-storage" }
hardy-localdisk-storage = { path = "../../localdisk-storage", features = ["serde"] }
tempfile = "3"
tokio = { version = "1", features = ["rt", "macros"] }
flume = "0.12"
time = { version = "0.3", features = ["std"] }
bytes = "1"
