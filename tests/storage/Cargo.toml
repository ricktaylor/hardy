[package]
name = "storage-tests"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[features]
postgres = ["dep:hardy-postgres-storage", "dep:sqlx", "dep:uuid"]
s3 = ["dep:hardy-s3-storage", "dep:uuid"]

[dependencies]
hardy-bpa = { path = "../../bpa" }
hardy-bpv7 = { path = "../../bpv7", features = ["std"] }
hardy-sqlite-storage = { path = "../../sqlite-storage" }
hardy-localdisk-storage = { path = "../../localdisk-storage", features = ["serde"] }
hardy-postgres-storage = { path = "../../postgres-storage", optional = true }
hardy-s3-storage = { path = "../../s3-storage", features = ["serde"], optional = true }
sqlx = { version = "0.8.6", default-features = false, features = ["postgres", "runtime-tokio"], optional = true }
uuid = { version = "1", features = ["v4"], optional = true }
tempfile = "3"
tokio = { version = "1", features = ["rt", "macros"] }
flume = "0.12"
time = { version = "0.3", features = ["std"] }
bytes = "1"
