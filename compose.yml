services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: hardy
      POSTGRES_PASSWORD: hardy
      POSTGRES_DB: hardy
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hardy"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/hardy-bundles
      "

  hardy:
    build:
      context: .
      dockerfile: ./bpa-server/Dockerfile
      args:
        CARGO_ARGS: "--features hardy-bpa-server/sqlite-storage,hardy-bpa-server/postgres-storage,hardy-bpa-server/s3-storage"
    image: hardy-bpa-server:latest
    restart: unless-stopped
    command: ["-u"]
    environment:
      HARDY_BPA_SERVER_CONFIG_FILE: /etc/hardy/config.yaml
      HARDY_BPA_SERVER_LOG_LEVEL: debug
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
    ports:
      - "50051:50051"
      - "4556:4556"
    volumes:
      - ./bpa-server/config.yaml:/etc/hardy/config.yaml:ro
    healthcheck:
      test: ["CMD", "/bin/grpc_health_probe", "-addr=127.0.0.1:50051"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  hardy-debug:
    profiles: ["debug"]
    build:
      context: .
      dockerfile: ./bpa-server/Dockerfile
    image: hardy-bpa-server:latest
    restart: unless-stopped
    environment:
      HARDY_BPA_SERVER_CONFIG_FILE: /etc/hardy/config.yaml
      # Env vars take precedence over config file
      HARDY_BPA_SERVER_LOG_LEVEL: debug
      HARDY_BPA_SERVER_STORAGE__METADATA__TYPE: memory
      HARDY_BPA_SERVER_STORAGE__BUNDLE__TYPE: memory
    ports:
      - "50051:50051"
      - "4556:4556"
    volumes:
      - ./bpa-server/config.yaml:/etc/hardy/config.yaml:ro
    healthcheck:
      test: ["CMD", "/bin/grpc_health_probe", "-addr=127.0.0.1:50051"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

volumes:
  postgres-data:
  minio-data:

