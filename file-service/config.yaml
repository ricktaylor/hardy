# Configuration for the hardy-file-service.
# Note: Commented out values represent the default settings.

# The logging level for the application.
# Can be one of: trace, debug, info, warn, error
# log-level: "info"

# The gRPC endpoint of the BPA to register with.
# bpa-address: "http://[::1]:50051"

# The service identifier to register with the BPA.
# This is the IPN service number or DTN service name that identifies
# this file service endpoint on the local node.
service-id: 42

# The destination EID for outgoing bundles.
# All payloads read from the outbox FIFO will be sent to this endpoint.
destination: "ipn:1.42"

# The bundle lifetime.
# Bundles that are not delivered within this time will be discarded.
# Accepts human-readable durations: "24h", "30m", "7d", "1h30m", etc.
# lifetime: "24h"

# Path to the outbox FIFO (named pipe).
# Payloads written to this FIFO are sent as bundles to the destination.
# The FIFO is created automatically if it does not exist.
# Each open-write-close cycle on the FIFO produces one bundle.
outbox: /tmp/hardy/outbox

# Path to the inbox directory.
# Incoming bundle payloads are written as individual files in this directory.
# The directory is created automatically if it does not exist.
inbox: /tmp/hardy/inbox
