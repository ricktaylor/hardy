name: Rust
on:
  pull_request:
    branches: ["main"]
    paths:
      - "**/*.rs"
      - "**/Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/rust.yml"
      - "proto/**"
      - "tests/**"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Use cached dependencies and artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci

      - name: Install Protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Check formatting
        run: cargo fmt --check

      - name: Check linting
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Build all tests
        run: cargo test --no-run --locked --all-features --workspace

  no-std:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Rust toolchain (32-bit bare-metal target)
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: thumbv7em-none-eabihf

      - name: Use cached dependencies and artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: no-std

      # thumbv7em-none-eabihf is a bare-metal target (no std) that is also
      # 32-bit (usize == u32), so this one job guards BOTH no_std compatibility
      # AND 32-bit-pointer-width compilation. --no-default-features keeps the
      # `std` feature off, so a dependency that silently pulls std — e.g. an
      # accidental `time/formatting` — fails here instead of shipping a broken
      # no_std build. This is a COMPILE check: it does not run tests, so it does
      # not catch runtime `as usize` truncation (a 32-bit *test* run would).
      #
      # bpv7's GLOBAL_COUNTER is an AtomicU64, which Cortex-M lacks natively, so
      # bpv7 (and eid-patterns, which depends on it) build with the
      # `critical-section` feature; a library (rlib) build compiles without a
      # critical-section impl — only final binaries need one.
      # TODO: extend to hardy-bpa once its --no-default-features build is
      # confirmed clean on this target.
      - name: Build cbor (no_std, 32-bit)
        run: >
          cargo build --locked --no-default-features
          -p hardy-cbor
          --target thumbv7em-none-eabihf

      - name: Build bpv7 + eid-patterns (no_std, 32-bit)
        run: >
          cargo build --locked --no-default-features
          --features hardy-bpv7/critical-section
          -p hardy-bpv7
          -p hardy-eid-patterns
          --target thumbv7em-none-eabihf

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v7

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Restore cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci
          save-if: false

      - name: Install Protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Run tests
        run: cargo test --locked --all-features --verbose --workspace --exclude storage-tests

  storage-tests:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v7

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Restore cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci
          save-if: false

      - name: Install Protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Start postgres and minio
        run: |
          docker compose up -d --wait postgres minio

      - name: Create S3 test bucket
        run: |
          docker compose exec minio \
            mc alias set local http://localhost:9000 minioadmin minioadmin
          docker compose exec minio \
            mc mb --ignore-existing local/hardy-test

      - name: Run storage tests
        env:
          TEST_POSTGRES_URL: postgresql://hardy:hardy@localhost:5432
          TEST_S3_ENDPOINT: http://localhost:9000
          AWS_ACCESS_KEY_ID: minioadmin
          AWS_SECRET_ACCESS_KEY: minioadmin
        run: cargo test -p storage-tests --locked --features postgres,s3 --verbose

      - name: Cleanup
        if: always()
        run: docker compose down -v

  ping-tests:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v7

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Restore cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci
          save-if: false

      - name: Install Protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Build binaries
        run: cargo build --locked --all-features -p hardy-bpa-server -p hardy-tools

      - name: Run ping tests
        env:
          BP_BIN: ./target/debug/bp
          HARDY_BPA_SERVER_CONFIG_FILE: ./bpa-server/config.yaml
          HARDY_BPA_SERVER_BPSEC__KEYS_FILE: ./bpa-server/examples/keys.jwks
          HARDY_BPA_SERVER_STORAGE__METADATA__TYPE: memory
          HARDY_BPA_SERVER_STORAGE__BUNDLE__TYPE: memory
        run: |
          ./target/debug/hardy-bpa-server &
          bash ./tests/interop/hardy/run_hardy_ping_test.sh --peer 127.0.0.1:4556 --count 5

  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Read MSRV from Cargo.toml
        id: msrv
        run: echo "version=$(grep -m1 '^rust-version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')" >> "$GITHUB_OUTPUT"

      - name: Setup Rust toolchain (MSRV ${{ steps.msrv.outputs.version }})
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ steps.msrv.outputs.version }}

      - name: Use cached dependencies and artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: msrv

      - name: Install Protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Check on MSRV
        run: cargo check --locked --all-features --workspace
