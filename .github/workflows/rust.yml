name: Rust
on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Use cached dependencies and artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci

      - name: Install Protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Check formatting
        run: cargo fmt --check

      - name: Check linting
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Build all tests
        run: cargo test --no-run --locked --all-features --workspace

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Restore cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci
          save-if: false

      - name: Install Protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Run tests
        run: cargo test --locked --all-features --verbose --workspace --exclude storage-tests

  storage-tests:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Restore cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci
          save-if: false

      - name: Install Protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Start postgres and minio
        run: docker compose -f tests/compose.storage-tests.yml up -d --wait

      - name: Run storage tests
        env:
          TEST_POSTGRES_URL: postgresql://hardy:hardy@localhost:5432
          TEST_S3_ENDPOINT: http://localhost:9000
          AWS_ACCESS_KEY_ID: minioadmin
          AWS_SECRET_ACCESS_KEY: minioadmin
        run: cargo test -p storage-tests --locked --features postgres,s3 --verbose

      - name: Cleanup
        if: always()
        run: docker compose -f tests/compose.storage-tests.yml down -v

  ping-tests:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Hardy image (cache)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./bpa-server/Dockerfile
          target: runtime
          tags: hardy-bpa-server:latest
          build-args: CARGO_ARGS=--features hardy-bpa-server/sqlite-storage,hardy-bpa-server/postgres-storage
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Build ping-tests image (cache)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./tests/Dockerfile.tools
          tags: hardy-ping-tests:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Run ping tests
        run: docker compose -f compose.yml -f tests/compose.ping-tests.yml up --no-build --abort-on-container-exit --exit-code-from ping-tests

      - name: Cleanup
        if: always()
        run: docker compose -f compose.yml -f tests/compose.ping-tests.yml down -v
