name: Rust
on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Use cached dependencies and artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci

      - name: Install Protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Check formatting
        run: cargo fmt --check

      - name: Check linting
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Build all tests
        run: cargo test --no-run --locked --all-features --workspace

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Restore cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci
          save-if: false

      - name: Install Protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Run tests
        run: cargo test --locked --all-features --verbose --workspace --exclude storage-tests

  storage-tests:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Restore cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci
          save-if: false

      - name: Install Protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Start postgres and minio
        run: |
          docker compose -f tests/compose.storage-tests.yml up -d --wait

      - name: Create S3 test bucket
        run: |
          docker compose -f tests/compose.storage-tests.yml exec minio \
            mc alias set local http://localhost:9000 minioadmin minioadmin
          docker compose -f tests/compose.storage-tests.yml exec minio \
            mc mb --ignore-existing local/hardy-test

      - name: Run storage tests
        env:
          TEST_POSTGRES_URL: postgresql://hardy:hardy@localhost:5432
          TEST_S3_ENDPOINT: http://localhost:9000
          AWS_ACCESS_KEY_ID: minioadmin
          AWS_SECRET_ACCESS_KEY: minioadmin
        run: cargo test -p storage-tests --locked --features postgres,s3 --verbose

      - name: Cleanup
        if: always()
        run: docker compose -f tests/compose.storage-tests.yml down -v

  ping-tests:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Restore cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci
          save-if: false

      - name: Install Protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Build binaries
        run: cargo build --locked --all-features -p hardy-bpa-server -p hardy-tools

      - name: Write config
        run: |
          cat > /tmp/hardy-ping-test.toml << 'EOF'
          log-level = "info"
          node-ids = ["ipn:1.0", "dtn://my-node/"]
          status-reports = true
          poll-channel-depth = 16
          processing-pool-size = 16

          [storage]
          lru-capacity = 1024
          max-cached-bundle-size = 16384

          [storage.metadata]
          type = "memory"

          [storage.bundle]
          type = "memory"

          [grpc]
          address = "[::]:50051"
          services = ["application", "cla", "service"]

          [rfc9171-validity]
          primary-block-integrity = true
          bundle-age-required = true

          [built-in-services]
          echo = [7, "echo"]

          [[clas]]
          name = "tcp-cla-1"
          type = "tcpclv4"
          address = "[::]:4556"
          segment-mru = 16384
          transfer-mru = 562949953421312
          max-idle-connections = 6
          contact-timeout = 15
          keepalive-interval = 60
          require-tls = false
          EOF

      - name: Run ping tests
        env:
          BP_BIN: ./target/debug/bp
        run: |
          HARDY_BPA_SERVER_CONFIG_FILE=/tmp/hardy-ping-test.toml ./target/debug/hardy-bpa-server &
          bash ./tests/interop/hardy/run_hardy_ping_test.sh --peer 127.0.0.1:4556 --count 5
