name: Rust
on:
  pull_request:
    branches: ["main"]
    paths:
      - "**/*.rs"
      - "**/Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/rust.yml"
      - "proto/**"
      - "tests/**"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Use cached dependencies and artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci

      - name: Install Protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Check formatting
        run: cargo fmt --check

      - name: Check linting
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Build all tests
        run: cargo test --no-run --locked --all-features --workspace

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Restore cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci
          save-if: false

      - name: Install Protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Run tests
        run: cargo test --locked --all-features --verbose --workspace --exclude storage-tests

  storage-tests:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Restore cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci
          save-if: false

      - name: Install Protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Start postgres and minio
        run: |
          docker compose up -d --wait postgres minio

      - name: Create S3 test bucket
        run: |
          docker compose exec minio \
            mc alias set local http://localhost:9000 minioadmin minioadmin
          docker compose exec minio \
            mc mb --ignore-existing local/hardy-test

      - name: Run storage tests
        env:
          TEST_POSTGRES_URL: postgresql://hardy:hardy@localhost:5432
          TEST_S3_ENDPOINT: http://localhost:9000
          AWS_ACCESS_KEY_ID: minioadmin
          AWS_SECRET_ACCESS_KEY: minioadmin
        run: cargo test -p storage-tests --locked --features postgres,s3 --verbose

      - name: Cleanup
        if: always()
        run: docker compose down -v

  ping-tests:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Restore cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci
          save-if: false

      - name: Install Protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Build binaries
        run: cargo build --locked --all-features -p hardy-bpa-server -p hardy-tools

      - name: Run ping tests
        env:
          BP_BIN: ./target/debug/bp
          HARDY_BPA_SERVER_CONFIG_FILE: ./bpa-server/config.yaml
          HARDY_BPA_SERVER_STORAGE__METADATA__TYPE: memory
          HARDY_BPA_SERVER_STORAGE__BUNDLE__TYPE: memory
        run: |
          ./target/debug/hardy-bpa-server &
          bash ./tests/interop/hardy/run_hardy_ping_test.sh --peer 127.0.0.1:4556 --count 5
