name: Tools

on:
  push:
    branches: ["main"]
    paths:
      - "tools/**"
      - "bpa/**"
      - "bpv7/**"
      - "cbor/**"
      - "proto/**"
      - "tcpclv4/**"
      - "async/**"
      - "patches/**"
      - "Cargo.lock"
      - ".github/workflows/tools.yml"

env:
  REGISTRY: ghcr.io

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Login to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/hardy-tools
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: "."
          file: ./tools/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/hardy-tools:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/hardy-tools:buildcache,mode=max
          platforms: linux/amd64,linux/arm64
