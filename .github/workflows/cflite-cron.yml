name: ClusterFuzzLite Cron
on:
  schedule:
    # Nightly, deliberately off the :00 mark.
    - cron: "23 3 * * *"
  workflow_dispatch:

permissions: read-all

env:
  STORAGE_REPO: https://${{ secrets.FUZZ_CORPUS_ACCESS_TOKEN }}@github.com/ricktaylor/hardy-fuzz-corpus.git

jobs:
  Fuzz:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # batch and prune both push the corpus `main` branch, so run the modes
      # one at a time to avoid racing pushes to hardy-fuzz-corpus.
      max-parallel: 1
      matrix:
        include:
          # Grow the corpus.
          - { mode: batch, sanitizer: address, fuzz-seconds: 900 }
          # Minimise it (required whenever batch fuzzing runs).
          - { mode: prune, sanitizer: address, fuzz-seconds: 600 }
          # Publish per-fuzzer line-coverage reports to the gh-pages branch:
          # https://ricktaylor.github.io/hardy-fuzz-corpus/coverage/latest/report/linux/report.html
          - { mode: coverage, sanitizer: coverage, fuzz-seconds: 600 }
    steps:
      - name: Build Fuzzers (${{ matrix.mode }})
        uses: google/clusterfuzzlite/actions/build_fuzzers@v1
        with:
          language: rust
          sanitizer: ${{ matrix.sanitizer }}

      - name: Run Fuzzers (${{ matrix.mode }})
        uses: google/clusterfuzzlite/actions/run_fuzzers@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fuzz-seconds: ${{ matrix.fuzz-seconds }}
          mode: ${{ matrix.mode }}
          sanitizer: ${{ matrix.sanitizer }}
          storage-repo: ${{ env.STORAGE_REPO }}
          storage-repo-branch: main
          storage-repo-branch-coverage: gh-pages
