name: ClusterFuzzLite PR
on:
  pull_request:
    branches: ["main"]
    paths:
      - "**/*.rs"
      - "**/Cargo.toml"
      - "Cargo.lock"
      - "**/fuzz/**"
      - ".clusterfuzzlite/**"
      - ".github/workflows/cflite-pr.yml"

permissions: read-all

concurrency:
  group: cflite-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  PR:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sanitizer: [address]
    steps:
      - name: Build Fuzzers (${{ matrix.sanitizer }})
        id: build
        uses: google/clusterfuzzlite/actions/build_fuzzers@v1
        with:
          language: rust
          sanitizer: ${{ matrix.sanitizer }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # TEMPORARY (cache discovery): find the host-side path that build_fuzzers
      # mounts as the container's $WORK, and confirm cargo's registry/target
      # persisted out of the container, so the next iteration can point
      # actions/cache at the right path. Remove once caching is wired.
      - name: Inspect build dirs (cache discovery)
        if: always()
        run: |
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE  HOME=$HOME"
          echo "--- candidate host dirs ---"
          for base in "$GITHUB_WORKSPACE" "$GITHUB_WORKSPACE/.." "$HOME" /tmp; do
            find "$base" -maxdepth 4 -type d \
              \( -name work -o -name out -o -name cargo -o -name registry -o -name 'build-*' \) \
              2>/dev/null
          done | sort -u
          echo "--- sizes of any cargo/registry/target found ---"
          for base in "$GITHUB_WORKSPACE" "$GITHUB_WORKSPACE/.." "$HOME"; do
            find "$base" -maxdepth 5 -type d \( -name cargo -o -name registry -o -name target \) 2>/dev/null
          done | sort -u | while read -r d; do du -sh "$d" 2>/dev/null; done

      - name: Run Fuzzers (${{ matrix.sanitizer }})
        id: run
        uses: google/clusterfuzzlite/actions/run_fuzzers@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fuzz-seconds: 300
          mode: "code-change"
          sanitizer: ${{ matrix.sanitizer }}
          output-sarif: false
          # PR runs start from the corpus accumulated by batch fuzzing.
          storage-repo: https://${{ secrets.FUZZ_CORPUS_ACCESS_TOKEN }}@github.com/ricktaylor/hardy-fuzz-corpus.git
          storage-repo-branch: main
