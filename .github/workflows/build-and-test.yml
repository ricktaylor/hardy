name: Build, test and E2E
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: build-and-test-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Use cached dependencies and artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install Protoc
        uses: arduino/setup-protoc@v3

      - name: Check formatting
        run: cargo fmt --check

      - name: Build
        run: cargo build --locked --release --all-features --verbose

      - name: Check linting
        run: cargo clippy --locked -- -D warnings

      - name: Test
        run: cargo test --locked --release --all-features --verbose

  e2e-tests:
    runs-on: ubuntu-latest
    needs: build-and-unit-test
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Hardy image (cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: runtime
          tags: hardy:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Build e2e-tests image (cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./tests/Dockerfile.tools
          tags: hardy_e2e-tests
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Run E2E tests
        run: docker compose -f compose.yaml -f tests/compose.e2e.yml up --no-build --abort-on-container-exit --exit-code-from e2e-tests

      - name: Cleanup
        if: always()
        run: docker compose -f compose.yaml -f tests/compose.e2e.yml down -v
