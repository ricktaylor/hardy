services:
  hardy:
    build: .
    image: hardy:latest
    restart: unless-stopped
    environment:
      HARDY_BPA_SERVER_CONFIG_FILE: /etc/hardy/config.toml
    ports:
      - "50051:50051"
      - "4556:4556"
    volumes:
      - bundles:/var/lib/hardy/bundles
    configs:
      - source: hardy-config
        target: /etc/hardy/config.toml

volumes:
  bundles:

configs:
  hardy-config:
    content: |
      log_level = "debug"
      node_ids = ["ipn:1.0", "dtn://my-node/"]
      ipn-legacy-nodes = []
      echo = [7, "echo"]
      status_reports = true
      poll_channel_depth = 16
      processing_pool_size = 16

      [grpc]
      address = "[::]:50051"
      services = ["application", "cla", "service"]

      [storage]
      lru_capacity = 1024
      max_cached_bundle_size = 16384

      [metadata_storage]
      type = "memory"
      
      [bundle_storage]
      type = "localdisk"
      store_dir = "/var/lib/hardy/bundles"
      fsync = true

      [rfc9171-validity]
      primary-block-integrity = true
      bundle-age-required = true

      [[clas]]
      name = "tcp-cla-1"
      type = "tcpclv4"
      address = "[::]:4556"
      segment_mru = 16384
      transfer_mru = 562949953421312
      max_idle_connections = 6
      contact_timeout = 15
      keepalive_interval = 60
      must_use_tls = false