services:
  hardy:
    build: .
    image: hardy:latest
    restart: unless-stopped
    environment:
      HARDY_BPA_SERVER_CONFIG_FILE: /etc/hardy/config.toml
    ports:
      - "50051:50051"
      - "4556:4556"
    volumes:
      - bundles:/var/lib/hardy/bundles
    configs:
      - source: hardy-config
        target: /etc/hardy/config.toml

volumes:
  bundles:

configs:
  hardy-config:
    content: |
      log-level = "debug"
      node-ids = ["ipn:1.0", "dtn://my-node/"]
      status-reports = true
      poll-channel-depth = 16
      processing-pool-size = 16

      [grpc]
      address = "[::]:50051"
      services = ["application", "cla", "service"]

      [storage]
      lru-capacity = 1024
      max-cached-bundle-size = 16384

      [storage.metadata]
      type = "memory"

      [storage.bundle]
      type = "localdisk"
      store-dir = "/var/lib/hardy/bundles"
      fsync = true

      [rfc9171-validity]
      primary-block-integrity = true
      bundle-age-required = true

      [built-in-services]
      echo = [7, "echo"]

      [[clas]]
      name = "tcp-cla-1"
      type = "tcpclv4"
      address = "[::]:4556"
      segment-mru = 16384
      transfer-mru = 562949953421312
      max-idle-connections = 6
      contact-timeout = 15
      keepalive-interval = 60
      require-tls = false