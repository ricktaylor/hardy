[package]
name = "hardy-bpv7-tools"
version = "0.2.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
description = "CLI tools for BPv7 bundle operations"
publish = false

[[bin]]
name = "bundle"
path = "src/main.rs"

[dependencies]
hardy-bpv7 = { version = "0.6", path = "..", features = ["std","serde","rfc9173"] }
hardy-cbor = { version = "2", path = "../../cbor" }
clap = { version = "4", features = ["derive"] }
humantime = "2"
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[dev-dependencies]
hex-literal = "1"
