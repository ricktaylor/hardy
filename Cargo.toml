# Stub patch: Cargo resolves sqlx's optional `sqlx-sqlite` dep eagerly (to produce a lock
# file valid for all feature combinations), which drags in `libsqlite3-sys`
# (links = "sqlite3"). That collides with rusqlite's copy — Cargo allows only one package
# per `links` value — and fails resolution even though we never enable sqlx's sqlite
# feature. The stub replaces sqlx-sqlite with a no-dep shell at the same version, removing
# the conflict. See patches/sqlx-sqlite/README.md.
[patch.crates-io]
sqlx-sqlite = { path = "patches/sqlx-sqlite" }

[profile.release]
#lto = true
#codegen-units = 1

[workspace.package]
edition = "2024"
rust-version = "1.87"
license = "Apache-2.0"
repository = "https://github.com/ricktaylor/hardy"
