    "async",
    "bibe",
    "bpa-server",
    "bpa",
    "bpa/fuzz",
    "bpv7",
    "bpv7/tools",
    "bpv7/fuzz",
    "btpu",
    "cbor",
    "cbor/tools",
    "cbor/fuzz",
    "echo-service",
    "eid-patterns",
    "eid-patterns/fuzz",
    "file-cla",
    "ipn-legacy-filter",
    "localdisk-storage",
    "otel",
    "s3-storage",
    "proto",
    "sqlite-storage",
    "tcpclv4",
    "tcpclv4/fuzz",
    "tcpclv4-server",
    "tools",
    "tvr",
    "tests/bpsec",
    "tests/storage",
    "postgres-storage",
