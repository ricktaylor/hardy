[package]
name = "hardy-bpa-fuzz"
version = "0.0.0"
publish = false
edition.workspace = true
rust-version.workspace = true

[package.metadata]
cargo-fuzz = true

[features]
default = []
postgres-storage = ["dep:hardy-postgres-storage"]
sqlite-storage = ["dep:hardy-sqlite-storage"]
localdisk-storage = ["dep:hardy-localdisk-storage"]
file-cla = ["dep:hardy-file-cla"]
instrument = ["hardy-bpa/instrument","hardy-sqlite-storage?/instrument","hardy-localdisk-storage?/instrument","hardy-file-cla?/instrument"]

[dependencies]
libfuzzer-sys = "0.4"
hardy-otel = { path = "../../otel" }
hardy-async = { path = "../../async" }
hardy-bpv7 = { path = "../../bpv7" }
hardy-bpa = { path = ".." }
hardy-postgres-storage = { path = "../../postgres-storage", optional = true }
hardy-sqlite-storage = { path = "../../sqlite-storage", optional = true }
hardy-localdisk-storage = { path = "../../localdisk-storage", optional = true }
hardy-file-cla = { path = "../../file-cla", optional = true }
tokio = { version = "1.51.1", features = ["rt-multi-thread", "time"] }
time = { version = "0.3.47", features = ["parsing"] }
tracing = { version = "0.1.44", default-features = false }
arbitrary = { version = "1.4.2", features = ["derive"] }
cfg-if = "1"
flume = "0.12.0"
percent-encoding = { version = "2.3.2", default-features = false, features = ["alloc"] }

[lib]
path = "src/lib.rs"
test = true
doc = false

[[bin]]
name = "bpa"
path = "fuzz_targets/bpa.rs"
test = false
bench = false
doc = false
