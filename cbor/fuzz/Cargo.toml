[package]
name = "hardy-cbor-fuzz"
version = "0.0.0"
publish = false
edition.workspace = true
rust-version.workspace = true

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
hardy-cbor = { path = ".." }

[[bin]]
name = "decode"
path = "fuzz_targets/decode.rs"
test = false
bench = false
doc = false

[[bin]]
name = "stream_decode"
path = "fuzz_targets/stream_decode.rs"
test = false
bench = false
doc = false

[[bin]]
name = "stream_roundtrip"
path = "fuzz_targets/stream_roundtrip.rs"
test = false
bench = false
doc = false

[lib]
name = "test"
path = "test.rs"
test = true
doc = false
